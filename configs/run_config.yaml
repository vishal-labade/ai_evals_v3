# ============================================================
# V2 Behavioral Lane Run Config
# Only models defined here will be executed.
# Comment / uncomment profiles to control which models run.
# ============================================================

run:
  run_name: v2_behavioral
  output_dir: results/v2/runs
  limit: null          # set to 10 for smoke test
  shuffle: true
  seed: 123

# ============================================================
# MODEL PROFILES
# Keep ONLY the models you want to execute.
# ============================================================

# -------- Large --------
qwen_14b_t0:
  host: http://localhost:11434
  model: qwen2.5:14b
  options:
    temperature: 0.0
    num_predict: 256
    num_ctx: 2048


# -------- Mid --------


gemma_9b_t0:
  host: http://localhost:11434
  model: gemma2:9b-instruct-q4_K_M
  options:
    temperature: 0.2
    num_predict: 256
    num_ctx: 2048


# -------- Small --------
qwen_3b_t0:
  host: http://localhost:11434
  model: qwen2.5:3b
  options:
    temperature: 0.0
    num_predict: 256
    num_ctx: 2048

qwen_3b:
  host: http://localhost:11434
  model: qwen2.5:3b
  options:
    temperature: 0.2
    num_predict: 256
    num_ctx: 2048


# Extra Large Models;

qwen_32b_t0:
  host: http://localhost:11434
  model: qwen2.5:32b-instruct-q4_K_M
  options:
    temperature: 0.0
    num_predict: 256
    num_ctx: 4096

gemma2_27b_t0:
  host: http://localhost:11434
  model: gemma2:27b
  options:
    temperature: 0.0
    num_predict: 256
    num_ctx: 4096



# ============================================================
# Input Format (if required by your runner)
# ============================================================

input_format:
  template: "CONTEXT:\n{context}\n\nINSTRUCTION:\n{prompt}\n"

prompts:
  path: data/v2_suite_50.jsonl